name: coverage

on:
  schedule:
    # Run at midnight on Sundays
    - cron: "0 0 * * 0"

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r test/requirements.txt
        pip install "coverage>=7.10,<8"

    - name: setup
      run: |
        ln -s pavilion.yaml.ci test/data/pav_config_dir/pavilion.yaml
        echo "working_dir: $(pwd)/test/working_dir" >> test/data/pav_config_dir/pavilion.yaml
        echo "spack_path: $(pwd)/test/spack" >> test/data/pav_config_dir/pavilion.yaml
        ./test/utils/spack_setup test

    - name: run_tests
      run: |
        sudo -E su $USER -c "PATH=$PATH; python -m coverage run ./test/run_tests"

    - name: Generate and show report
      run: |
        python -m coverage combine
        python -m coverage report
        python -m coverage xml
        python -m coverage html

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: htmlcov

    - name: Upload XML coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: xmlcov