name: Open stable -> develop PR after push to stable

on:
  push:
    branches: [stable]

permissions:
  contents: write
  pull-requests: write

jobs:
  open-sync-pr:
    runs-on: ubuntu-latest

    env:
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      HEAD_BRANCH: stable
      REMOTE: origin
      STAGING_BRANCH: ci/sync-stable-to-develop

    steps:
      - name: Checkout Pavilion repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_BRANCH }}
          fetch-depth: 0

      - name: Create (or reset) staging branch off of ${{ env.BASE_BRANCH }} to prepare merge
        run: |
          git checkout -B ${{ env.STAGING_BRANCH }}
          git push -f ${{ env.REMOTE }} ${{ env.STAGING_BRANCH}}

      - name: Create pull request from ${{ env.HEAD_BRANCH }} to ${{ env.BASE_BRANCH }}
        uses: peter-evans/create-pull-request@v8
        with:
          base: ${{ env.BASE_BRANCH }}
          branch: ${{ env.STAGING_BRANCH }}
          commit-message: "Sync `${{ env.HEAD_BRANCH}}` into `${{ env.BASE_BRANCH }}`"
          title: "Sync `${{ env.HEAD_BRANCH }}` into `${{ env.BASE_BRANCH}}`"
          body: |
            **This PR was generated automatically by the `sync-stable` workflow because changes
            were pushed to the `${{ env.HEAD_BRANCH }}` branch. Please review if carefully.**

            This PR proposes merging the latest changes from `${{ env.HEAD_BRANCH }}` into
            `${{ env.BASE_BRANCH }}`. It requires a human developer to actually perform the merge.

          delete-branch: true