name: Open stable -> develop PR after push to stable

on:
  push:
    branches: [stable]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-sync-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # safer for branch-based operations

      - name: Create PR from stable to develop if one does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr="$(gh pr list \
            --base develop \
            --head stable \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$existing_pr" ]; then
            echo "An open PR already exists: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head stable \
            --title "Sync stable into develop" \
            --body "Automatically opened because changes were pushed to \`stable\`."