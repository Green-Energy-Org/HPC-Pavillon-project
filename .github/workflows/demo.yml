name: Run demo tests

on:
  push:
    branches:
      - develop
      - stable
  pull_request:
    branches:
      - develop
      - stable

permissions:
  contents: read

jobs:
  load-python-version:
    name: Load Python version
    runs-on: self-hosted

    outputs:
      default_py_version: ${{steps.load-py-version.outputs.default_py_version}}

    steps:
      - name: Checkout Pavilion repository
        uses: actions/checkout@v6

      - name: Load Python version matrix
        id: load-py-version
        run: |
          echo "default_py_version=$(jq -c '.default_py_version' .github/py-versions.json)" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  demo_runs:
    name: Run demo tests
    runs-on: ${{ fromJson(needs.load-python-version.outputs.default_py_version).os }}
    needs: load-python-version

    steps:
    - name: Checkout Pavilion repository
      uses: actions/checkout@v6

    - name: Setup Python ${{ fromJson(needs.load-python-version.outputs.default_py_version).python }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ fromJson(needs.load-python-version.outputs.default_py_version).python }}

    - name: Install dependencies
      run: sudo apt install gcc

    - name: Run demo tests
      run: |
        source examples/demo/activate.sh
        pav run -v QUIET demo advanced buildit
        pav wait
        pav results --all-passed

    - name: Zip working directory
      if: failure()
      run: |
        # If we don't zip this ourselves, it will run infinitely due to
        # symlink loops.
        cd examples/demo
        ../../test/utils/make_symlinks_relative working_dir
        zip -yr demo_working_dir.zip working_dir

    - name: Upload working directory
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: demo_working_directory
        path: examples/demo/demo_working_dir.zip
